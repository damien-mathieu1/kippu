version: "3.9"

services:
  # ── Infrastructure ────────────────────────────────────────────────────────────

  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093,2@kafka2:9093
      KAFKA_LISTENERS: PLAINTEXT://:29092,CONTROLLER://:9093,PLAINTEXT_HOST://:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 2
      CLUSTER_ID: 5L6g3nShT-eMCtK--X86sw
    volumes:
      - kafka-data:/var/lib/kafka/data

  kafka2:
    image: apache/kafka:3.7.0
    container_name: kafka2
    ports:
      - "9094:9094"
    environment:
      KAFKA_NODE_ID: 2
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093,2@kafka2:9093
      KAFKA_LISTENERS: PLAINTEXT://:29092,CONTROLLER://:9093,PLAINTEXT_HOST://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka2:29092,PLAINTEXT_HOST://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 2
      CLUSTER_ID: 5L6g3nShT-eMCtK--X86sw
    volumes:
      - kafka2-data:/var/lib/kafka/data

  init-topics:
    image: apache/kafka:3.7.0
    depends_on:
      - kafka
      - kafka2
    entrypoint: >
      bash -c "
        echo 'Waiting for Kafka...' &&
        sleep 30 &&
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists --topic whatsapp-msg --partitions 3 --replication-factor 2 &&
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists --topic mail-msg --partitions 3 --replication-factor 2 &&
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists --topic formatted-ticket --partitions 3 --replication-factor 2 &&
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists --topic mail-msg-dlq --partitions 3 --replication-factor 2 &&
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists --topic whatsapp-msg-dlq --partitions 3 --replication-factor 2 &&
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists --topic formatted-ticket-dlq --partitions 3 --replication-factor 2 &&
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists --topic labelized-ticket --partitions 3 --replication-factor 2 &&
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists --topic labelized-ticket-dlq --partitions 3 --replication-factor 2 &&
        echo 'Topics created'
      "

  kafka-ui:
    image: ghcr.io/kafbat/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092,kafka2:29092
    depends_on:
      - kafka
      - kafka2

  postgres:
    image: postgres:16
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
      POSTGRES_DB: ${POSTGRES_DB:-messages}
    volumes:
      - pg-data:/var/lib/postgresql/data

  garage:
    image: dxflrs/garage:v1.0.1
    container_name: garage
    ports:
      - "3900:3900"
      - "3902:3902"
    volumes:
      - garage-data:/var/lib/garage/data
      - garage-meta:/var/lib/garage/meta

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama

  init-ollama:
    image: ollama/ollama:latest
    depends_on:
      - ollama
    environment:
      OLLAMA_HOST: ${OLLAMA_HOST:-http://ollama:11434}
    entrypoint: >
      bash -c "
        echo 'Waiting for Ollama...' &&
        sleep 10 &&
        ollama pull llama3.2:1b &&
        echo 'Model pulled'
      "

  # ── Application services (profile: app) ──────────────────────────────────────

  producer:
    profiles: [app]
    build:
      context: .
      dockerfile: producer/Dockerfile
    container_name: kippu-producer
    restart: unless-stopped
    environment:
      NODE_ENV: production
      KAFKA_BROKERS: kafka:29092
      ERROR_RATE: ${ERROR_RATE:-0.1}
    depends_on:
      - kafka
      - init-topics

  whatsapp-consumer:
    profiles: [app]
    build:
      context: .
      dockerfile: consumer/whatsappMsgConsumer/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      KAFKA_BROKERS: kafka:29092
      POSTGRES_HOST: postgres
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
      POSTGRES_DB: ${POSTGRES_DB:-messages}
      AUTO_MIGRATE: ${AUTO_MIGRATE:-true}
    depends_on:
      - kafka
      - postgres
      - init-topics

  mail-consumer:
    profiles: [app]
    build:
      context: .
      dockerfile: consumer/mailMsgConsumer/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      KAFKA_BROKERS: kafka:29092
      POSTGRES_HOST: postgres
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
      POSTGRES_DB: ${POSTGRES_DB:-messages}
      AUTO_MIGRATE: ${AUTO_MIGRATE:-true}
    depends_on:
      - kafka
      - postgres
      - init-topics

  formatted-ticket-consumer:
    profiles: [app]
    build:
      context: .
      dockerfile: consumer/formattedTicketConsumer/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      KAFKA_BROKERS: kafka:29092
      OLLAMA_HOST: ${OLLAMA_HOST:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2:1b}
    depends_on:
      - kafka
      - ollama
      - init-ollama
      - init-topics

  labelized-ticket-consumer:
    profiles: [app]
    build:
      context: .
      dockerfile: consumer/labelizedTicketConsumer/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      KAFKA_BROKERS: kafka:29092
      POSTGRES_HOST: postgres
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
      POSTGRES_DB: ${POSTGRES_DB:-messages}
      AUTO_MIGRATE: ${AUTO_MIGRATE:-true}
      DISCORD_WEBHOOK_URL_TICKET: ${DISCORD_WEBHOOK_URL_TICKET}
    depends_on:
      - kafka
      - postgres
      - init-topics

  dlq-error-manager:
    profiles: [app]
    build:
      context: .
      dockerfile: consumer/dlqErrorConsumer/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      KAFKA_BROKERS: kafka:29092
      POSTGRES_HOST: postgres
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
      POSTGRES_DB: ${POSTGRES_DB:-messages}
      AUTO_MIGRATE: ${AUTO_MIGRATE:-true}
      DISCORD_WEBHOOK_URL_ERROR: ${DISCORD_WEBHOOK_URL_ERROR}
    depends_on:
      - kafka
      - postgres
      - init-topics

volumes:
  kafka-data:
  kafka2-data:
  pg-data:
  garage-data:
  garage-meta:
  ollama-data:
