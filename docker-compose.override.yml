# docker-compose.override.yml
# This file extends docker-compose.yml with the application services (producer + consumers).
# It is NOT committed by default — rename it to activate it, or use:
#   docker-compose -f docker-compose.yml -f docker-compose.override.yml up
#
# Each service MUST be built from the repo root:
#   docker build -f producer/Dockerfile .
#   docker build -f consumer/whatsappMsgConsumer/Dockerfile .
#
# Common substitution variables (set in .env or export before running):
#   KAFKA_BROKERS=kafka:29092
#   POSTGRES_USER, POSTGRES_PASSWORD, POSTGRES_DB
#   OLLAMA_HOST=http://ollama:11434

version: "3.9"

services:
  # ── Producer ──────────────────────────────────────────────────────────────
  producer:
    build:
      context: .
      dockerfile: producer/Dockerfile
    container_name: kippu-producer
    restart: unless-stopped
    environment:
      NODE_ENV: production
      KAFKA_BROKERS: kafka:29092
    depends_on:
      - kafka
      - init-topics

  # ── WhatsApp message consumer ─────────────────────────────────────────────
  whatsapp-consumer:
    build:
      context: .
      dockerfile: consumer/whatsappMsgConsumer/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      KAFKA_BROKERS: kafka:29092
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
      POSTGRES_DB: ${POSTGRES_DB:-messages}
      POSTGRES_HOST: postgres
    depends_on:
      - kafka
      - postgres
      - init-topics

  # ── Mail message consumer ─────────────────────────────────────────────────
  mail-consumer:
    build:
      context: .
      dockerfile: consumer/mailMsgConsumer/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      KAFKA_BROKERS: kafka:29092
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
      POSTGRES_DB: ${POSTGRES_DB:-messages}
      POSTGRES_HOST: postgres
    depends_on:
      - kafka
      - postgres
      - init-topics

  # ── Formatted-ticket consumer (uses Ollama LLM) ───────────────────────────
  formatted-ticket-consumer:
    build:
      context: .
      dockerfile: consumer/formattedTicketConsumer/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      KAFKA_BROKERS: kafka:29092
      OLLAMA_HOST: http://ollama:11434
    depends_on:
      - kafka
      - ollama
      - init-ollama
      - init-topics

  # ── Labelized-ticket consumer ─────────────────────────────────────────────
  labelized-ticket-consumer:
    build:
      context: .
      dockerfile: consumer/labelizedTicketConsumer/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      KAFKA_BROKERS: kafka:29092
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
      POSTGRES_DB: ${POSTGRES_DB:-messages}
      POSTGRES_HOST: postgres
    depends_on:
      - kafka
      - postgres
      - init-topics

  # ── DLQ error manager ─────────────────────────────────────────────────────
  dlq-error-manager:
    build:
      context: .
      dockerfile: consumer/dlqErrorConsumer/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      KAFKA_BROKERS: kafka:29092
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
      POSTGRES_DB: ${POSTGRES_DB:-messages}
      POSTGRES_HOST: postgres
    depends_on:
      - kafka
      - postgres
      - init-topics
